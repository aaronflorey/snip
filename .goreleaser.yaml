version: 2

project_name: snip

gomod:
  proxy: false

builds:
  - main: ./cmd/snip
    binary: snip
    ldflags:
      - -s -w -X github.com/aaronflorey/snip/internal/cli.version={{ .Version }}
    env:
      - CGO_ENABLED=0
    goos:
      - linux
      - darwin
      - windows
    goarch:
      - amd64
      - arm64

archives:
  - formats: [tar.gz]
    name_template: "{{ .ProjectName }}_{{ .Version }}_{{ .Os }}_{{ .Arch }}"
    format_overrides:
      - goos: windows
        formats: [zip]

checksum:
  name_template: "checksums.txt"

brews:
  - repository:
      owner: aaronflorey
      name: homebrew-tap
      token: "{{ .Env.HOMEBREW_TAP_GITHUB_TOKEN }}"
    directory: Formula
    homepage: "https://github.com/aaronflorey/snip"
    description: "CLI proxy that reduces LLM token consumption by filtering shell output"
    license: MIT
    install: |
      bin.install "snip"
    test: |
      system "#{bin}/snip", "--version"

changelog:
  sort: asc
  filters:
    exclude:
      - "^docs:"
      - "^test:"
      - "^ci:"
